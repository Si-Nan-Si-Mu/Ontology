<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="POG">
  <title>POG 人格本体图标识</title>
  <defs>
    <linearGradient id="pogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="#0f172a"/>
  <g filter="url(#soft)">
    <line x1="64" y1="36" x2="36" y2="88" stroke="url(#pogGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="64" y1="36" x2="92" y2="88" stroke="url(#pogGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="36" y1="88" x2="92" y2="88" stroke="#6366f1" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <circle cx="64" cy="32" r="16" fill="url(#pogGrad)"/>
    <circle cx="32" cy="92" r="14" fill="#a5b4fc"/>
    <circle cx="96" cy="92" r="14" fill="#c4b5fd"/>
  </g>
</svg>